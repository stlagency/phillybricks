# gitleaks config — required CI check (PRD §8). Push-protection is the real gate;
# this scans on push + full-history on first publish. Incident path = rotate immediately.
title = "Bandbox gitleaks"

[extend]
useDefault = true

[allowlist]
description = "Placeholders and docs are not leaks"
paths = [
  '''\.env\.example''',
  '''.*\.md''',
  '''_fonts/.*''',
  '''apps/web/public/fonts/.*''',
  '''.*\.woff2''',
]
regexes = [
  '''REPLACE_ME''',
  '''YOUR_PROJECT_REF''',
  '''sk_test_REPLACE_ME''',
  '''whsec_REPLACE_ME''',
  '''re_REPLACE_ME''',
]
